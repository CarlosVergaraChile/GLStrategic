        contenido_completo: "<p>Chile se encuentra ante una oportunidad histórica que va mucho más allá de los rankings de producción de energía barata. La visión que impulsa GL Strategic, junto a expertos como Claus van der Molen Buchholz, propone un cambio de modelo: pasar de ser un proveedor de recursos a ser un \"País Plataforma\". Actualmente, el país regala parte de su ventaja absoluta al exportar energía como electricidad, hidrógeno o amoníaco sin transformación local. El costo de oportunidad es inmenso, ya que el valor agregado, la tecnología y el aprendizaje industrial terminan acumulándose en las economías de destino, mientras Chile asume los riesgos logísticos y de almacenamiento.</p><p>El modelo de Ecoparques Industriales surge como la solución para localizar la ventaja. Un ecoparque no es estética verde; es arquitectura productiva diseñada para capturar el valor de la energía renovable (que en el norte alcanza costos récord de 15 USD/MWh) y utilizarla localmente en procesos de manufactura avanzada, minería verde y procesamiento de datos. Al integrar flujos de energía, agua desalada y tratamiento de residuos en un solo ecosistema, se logran economías de escala que reducen los costos operativos a un tercio de lo que costaría la energía exportada, facilitando además la gestión sistémica de permisos y licencias ambientales.</p><p>Proyectos como los Parques Solares Regenerativos (PSR) en Canela y Arica demuestran que es posible combinar la potencia energética con la regeneración de suelos y el desarrollo comunitario. No se trata solo de instalar paneles, sino de anclar industrias al territorio. Los líderes de la nueva economía energética no son los que más exportan, sino los que más valor extraen de sus recursos. Si Chile no localiza su energía y sus capacidades, seguirá financiando el desarrollo de otros. La meta es clara: convertir la energía barata en un factor estructural de competitividad que diversifique la canasta exportadora y genere empleo de alta c     async function cargarNoticia() {
      try {
        const params = new URLSearchParams(window.location.search);
        const noticiaId = parseInt(params.get('id')) || 1;
        
        let noticias = NOTICIAS_BACKUP;
        
        // Intentar cargar desde JSON externo
        try {
          const response = await fetch('assets/data/noticias.json');
          if (response.ok) {
            const data = await response.json();
            noticias = data.noticias || NOTICIAS_BACKUP;
          }
        } catch (e) {
          console.log('Usando datos de respaldo integrados');
        }
        
        const noticia = noticias.find(n => n.id === noticiaId);
        
        if (!noticia) {
          document.getElementById('noticia-container').innerHTML = `
            <div class="error">
              <p><strong>Noticia no encontrada</strong></p>
              <p>La noticia con ID ${noticiaId} no existe.</p>
            </div>
            <a href="index.html#noticias" class="back-button">← Volver a Noticias</a>
          `;
          return;
        }
        
        const fechaObj = new Date(noticia.fecha);
        const fechaFormato = fechaObj.toLocaleDateString('es-CL', { year: 'numeric', month: 'long', day: 'numeric' });
        
        let imagenHTML = '';
        if (noticia.imagen) {
          imagenHTML = `<div style="text-align: center; margin: 40px 0;"><img src="assets/images/${noticia.imagen}" alt="${noticia.titulo}" class="noticia-image visible" onerror="this.style.display='none'"></div>`;
        }
        
        const html = `
          <a href="index.html#noticias" class="back-button">← Volver a Noticias</a>
          <h1>${noticia.titulo}</h1>
          <div class="noticia-meta">
            <span>📅 ${fechaFormato}</span>
            <span>📂 ${noticia.categoria}</span>
          </div>
          <div class="author-section">
            <img src="assets/images/${noticia.imagen_autor}" 
                 alt="${noticia.autor}" 
                 class="author-img" 
                 onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(noticia.autor)}&background=00A3E0&color=fff&size=80'">
            <div class="author-info">
              <h3>${noticia.autor}</h3>
              <p>${noticia.rol}</p>
              <p>📅 ${fechaFormato}</p>
            </div>
          </div>
          <div class="categoria">${noticia.categoria}</div>
          <div class="content">
            ${noticia.contenido_completo || `<p>${noticia.extracto}</p>`}
          </div>
          ${imagenHTML}
          <a href="index.html#noticias" class="back-button">← Volver a Noticias</a>
        `;
        
        document.getElementById('noticia-container').innerHTML = html;
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('noticia-container').innerHTML = `
          <div class="error">
            <p><strong>Error al cargar la noticia</strong></p>
            <p>${error.message}</p>
          </div>
          <a href="index.html#noticias" class="back-button">← Volver a Noticias</a>
        `;
      }
    }
    
    document.addEventListener('DOMContentLoaded', cargarNoticia);
  </script>
</body>
